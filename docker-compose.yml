services:
  db:
    image: postgres:16-alpine
    container_name: dataharvest_db
    environment:
      POSTGRES_USER: dhuser
      POSTGRES_PASSWORD: dhpass
      POSTGRES_DB: dataharvest
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhuser -d dataharvest"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dataharvest_api
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
